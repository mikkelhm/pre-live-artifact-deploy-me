name: pipeline # You can add your own name for the pipeline here

# Trigger when committing to main branch
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering of the workflow

jobs:
  # Pack and upload the deployment Artifact
  cloud-artifact:
    name: "Prepare and Upload Artifact"
    uses: ./.github/workflows/cloud-artifact.yml
    secrets:
      projectId: ${{ secrets.PROJECT_ID }}
      umbracoCloudApiKey: ${{ secrets.UMBRACO_CLOUD_API_KEY }}
      deployApiKey: ${{ secrets.UMBRACO_DEPLOY_API_KEY }}
      identityClientSecret: ${{ secrets.UMBRACO_IDENTITY_CLIENT_SECRET }}
      imagingHmacSecretKey: ${{ secrets.UMBRACO_IMAGING_HMAC_SECRET_KEY }}

  # Deploy to Umbraco Cloud
  # ####
  # you can edit the variables noBuildAndRestore, skipVersionCheck, skipPreserveUmbracoCloudJson, 
  # and runSchemaExtraction
  # use booleans but as strings
  cloud-deployment:
    name: "Deploy to Cloud"
    needs: cloud-artifact
    uses: ./.github/workflows/cloud-deployment.yml
    with:
      artifactId: ${{ needs.cloud-artifact.outputs.artifactId }}
      targetEnvironmentAlias: ${{ vars.TARGET_ENVIRONMENT_ALIAS }}
      # Shipping a pre-built publish artifact — Cloud skips build/restore.
      noBuildAndRestore: "true"
      skipVersionCheck: "true"
      skipPreserveUmbracoCloudJson: "false"
      runSchemaExtraction: "true"
      dockerImageTag: "0.3.104-beta"
    secrets:
      projectId: ${{ secrets.PROJECT_ID }}
      umbracoCloudApiKey: ${{ secrets.UMBRACO_CLOUD_API_KEY }}

  # Manual gate: promotion to live must be approved in the GitHub Actions UI.
  # Configure required reviewers on the "live" environment in repo settings.
  approve-live:
    name: "Approve Live Promotion"
    needs: cloud-deployment
    runs-on: ubuntu-latest
    environment: live
    steps:
      - run: echo "Approved promotion to live."

  # Promote the same artifact built above to the live environment
  cloud-deployment-live:
    name: "Deploy to Live"
    needs: [cloud-artifact, approve-live]
    uses: ./.github/workflows/cloud-deployment.yml
    with:
      artifactId: ${{ needs.cloud-artifact.outputs.artifactId }}
      targetEnvironmentAlias: "live"
      # Same pre-built artifact is promoted — Cloud skips build/restore.
      noBuildAndRestore: "true"
      skipVersionCheck: "true"
      skipPreserveUmbracoCloudJson: "false"
      runSchemaExtraction: "true"
      dockerImageTag: "0.3.104-beta"
    secrets:
      projectId: ${{ secrets.PROJECT_ID }}
      umbracoCloudApiKey: ${{ secrets.UMBRACO_CLOUD_API_KEY }}
