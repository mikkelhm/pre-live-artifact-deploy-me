name: Prepare and Upload Artifact

on:
  workflow_call:
    secrets:
      projectId:
        required: true
      umbracoCloudApiKey:
        required: true
      deployApiKey:
        required: true
      identityClientSecret:
        required: true
      imagingHmacSecretKey:
        required: true
    outputs:
      artifactId:
        description: 'The Id of the uploaded artifact'
        value: ${{ jobs.prepareDeployment.outputs.artifactId }}

jobs:
  prepareDeployment:
    name: Prepare Artifact to cloud
    # Windows runner so the -r win-x64 publish is built in a matching platform
    # environment. Avoids subtle cross-compile issues (e.g. SqlClient native
    # pairing) seen when publishing Windows-RID assets from Linux.
    runs-on: windows-latest
    outputs:
      artifactId: ${{ steps.upload-artifact.outputs.artifactId }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Inject secrets into umbraco-cloud.json and appsettings.json before publish.
      # The repo omits these keys entirely (they'd otherwise override local env
      # vars, because Umbraco loads these files as config sources AFTER env vars).
      # Real values come from GitHub Actions secrets and are written in here.
      - name: Inject secrets into config files
        shell: pwsh
        env:
          DEPLOY_API_KEY: ${{ secrets.deployApiKey }}
          IDENTITY_CLIENT_SECRET: ${{ secrets.identityClientSecret }}
          IMAGING_HMAC_SECRET_KEY: ${{ secrets.imagingHmacSecretKey }}
        run: |
          $cloudPath = "src/UmbracoProject/umbraco-cloud.json"
          $cloud = Get-Content $cloudPath -Raw | ConvertFrom-Json
          if ($null -eq $cloud.Deploy) { $cloud | Add-Member -NotePropertyName Deploy -NotePropertyValue ([ordered]@{}) }
          if ($null -eq $cloud.Deploy.Settings) { $cloud.Deploy | Add-Member -NotePropertyName Settings -NotePropertyValue ([ordered]@{}) }
          $cloud.Deploy.Settings | Add-Member -NotePropertyName ApiKey -NotePropertyValue $env:DEPLOY_API_KEY -Force
          if ($null -eq $cloud.Identity) { $cloud | Add-Member -NotePropertyName Identity -NotePropertyValue ([ordered]@{}) }
          $cloud.Identity | Add-Member -NotePropertyName ClientSecret -NotePropertyValue $env:IDENTITY_CLIENT_SECRET -Force
          $cloud | ConvertTo-Json -Depth 10 | Set-Content $cloudPath -Encoding utf8

          $appPath = "src/UmbracoProject/appsettings.json"
          $app = Get-Content $appPath -Raw | ConvertFrom-Json
          if ($null -eq $app.Umbraco) { $app | Add-Member -NotePropertyName Umbraco -NotePropertyValue ([ordered]@{}) }
          if ($null -eq $app.Umbraco.CMS) { $app.Umbraco | Add-Member -NotePropertyName CMS -NotePropertyValue ([ordered]@{}) }
          if ($null -eq $app.Umbraco.CMS.Imaging) { $app.Umbraco.CMS | Add-Member -NotePropertyName Imaging -NotePropertyValue ([ordered]@{}) }
          $app.Umbraco.CMS.Imaging | Add-Member -NotePropertyName HMACSecretKey -NotePropertyValue $env:IMAGING_HMAC_SECRET_KEY -Force
          $app | ConvertTo-Json -Depth 10 | Set-Content $appPath -Encoding utf8

      # Publish the site framework-dependent for win-x64. Umbraco Cloud runs
      # customer sites on Windows App Service plans (see
      # Umbraco.Cloud.Hosting/.../AzureWebAppProvisioning.Worker.Service/appsettings.*.json
      # where every pricing tier sets OperatingSystem=Windows).
      # Framework-dependent keeps payload small since the runtime is on the server.
      - name: Publish site
        shell: pwsh
        run: |
          dotnet publish src/UmbracoProject/UmbracoProject.csproj `
            --configuration Release `
            --runtime win-x64 `
            --no-self-contained `
            --output "${{ github.workspace }}/publish" `
            /p:UseAppHost=false

      # Trim satellite resource assemblies for locales we don't serve — each
      # locale folder ships ~1MB of .resources.dll assemblies. Keeps default (en).
      - name: Trim unused locale satellites
        shell: pwsh
        run: |
          $publish = "${{ github.workspace }}/publish"
          foreach ($d in 'cs','de','es','fr','it','ja','ko','pl','pt-BR','ru','tr','zh-Hans','zh-Hant') {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue (Join-Path $publish $d)
          }
          $sizeMB = [math]::Round((Get-ChildItem $publish -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "Publish size after trim: $sizeMB MB"

      # Zip the publish output for upload.
      - name: Zip publish output
        shell: pwsh
        run: |
          $zipPath = "${{ github.workspace }}/sources.zip"
          Compress-Archive -Path "${{ github.workspace }}/publish/*" -DestinationPath $zipPath -Force
          $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
          Write-Host "Zipped artifact: $sizeMB MB"

      # store artifact for easy debug if needed
      - name: Store artifact in pipeline
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: ${{ github.workspace }}/sources.zip
          retention-days: 1

      # Upload your zipped artifact.
      # Paths are relative because ${{ github.workspace }} expands to a Windows
      # path with backslashes, which bash interprets as escape sequences when
      # unquoted in the folded command.
      - name: Post Zipped Artifact
        id: upload-artifact
        shell: bash
        run: |
          bash ./.github/scripts/upload_artifact.sh \
            "${{ secrets.projectId }}" \
            "${{ secrets.umbracoCloudApiKey }}" \
            "./sources.zip" \
            "Artifact for ${{ github.run_number }}" \
            "${{ github.run_number }}" \
            GITHUB
