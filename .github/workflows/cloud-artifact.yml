name: Prepare and Upload Artifact

on:
  workflow_call:
    inputs:
      newSha:
        required: false
        type: string
    secrets:
      projectId:
        required: true
      umbracoCloudApiKey:
        required: true
      deployApiKey:
        required: true
      identityClientSecret:
        required: true
      imagingHmacSecretKey:
        required: true
    outputs:
      artifactId:
        description: 'The Id of the uploaded artifact'
        value: ${{ jobs.prepareDeployment.outputs.artifactId }}

jobs:
  prepareDeployment:
    name: Prepare Artifact to cloud
    runs-on: ubuntu-latest
    outputs:
      artifactId: ${{ steps.upload-artifact.outputs.artifactId }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.newSha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Inject secrets into umbraco-cloud.json and appsettings.json before publish.
      # The repo omits these keys entirely (they'd otherwise override local env
      # vars, because Umbraco loads these files as config sources AFTER env vars).
      # Real values come from GitHub Actions secrets and are written in here.
      - name: Inject secrets into config files
        env:
          DEPLOY_API_KEY: ${{ secrets.deployApiKey }}
          IDENTITY_CLIENT_SECRET: ${{ secrets.identityClientSecret }}
          IMAGING_HMAC_SECRET_KEY: ${{ secrets.imagingHmacSecretKey }}
        run: |
          python3 - <<'PY'
          import json, os

          cloud_path = "src/UmbracoProject/umbraco-cloud.json"
          with open(cloud_path, "r", encoding="utf-8") as f:
              cloud = json.load(f)
          cloud.setdefault("Deploy", {}).setdefault("Settings", {})["ApiKey"] = os.environ["DEPLOY_API_KEY"]
          cloud.setdefault("Identity", {})["ClientSecret"] = os.environ["IDENTITY_CLIENT_SECRET"]
          with open(cloud_path, "w", encoding="utf-8") as f:
              json.dump(cloud, f, indent=2)

          app_path = "src/UmbracoProject/appsettings.json"
          with open(app_path, "r", encoding="utf-8") as f:
              app = json.load(f)
          app.setdefault("Umbraco", {}).setdefault("CMS", {}).setdefault("Imaging", {})["HMACSecretKey"] = os.environ["IMAGING_HMAC_SECRET_KEY"]
          with open(app_path, "w", encoding="utf-8") as f:
              json.dump(app, f, indent=2)
          PY
        shell: bash

      # Publish the site as a self-contained artifact. Cloud will zip-deploy this
      # directly to Kudu instead of rebuilding from source.
      - name: Publish site
        shell: bash
        run: |
          dotnet publish src/UmbracoProject/UmbracoProject.csproj \
            --configuration Release \
            --output "${{ github.workspace }}/publish" \
            /p:UseAppHost=false

      # Zip the publish output for upload.
      - name: Zip publish output
        shell: bash
        run: |
          cd "${{ github.workspace }}/publish"
          zip -r "${{ github.workspace }}/sources.zip" .

      # store artifact for easy debug if needed
      - name: Store artifact in pipeline
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: ${{ github.workspace }}/sources.zip
          retention-days: 1

      # Upload your zipped artifact
      - name: Post Zipped Artifact
        id: upload-artifact
        shell: bash
        run: >
          bash ${{ github.workspace }}/.github/scripts/upload_artifact.sh
          ${{ secrets.projectId }}
          ${{ secrets.umbracoCloudApiKey }}
          "${{ github.workspace }}/sources.zip"
          "Artifact for ${{ github.run_number }}"
          "${{ github.run_number }}"
          GITHUB
