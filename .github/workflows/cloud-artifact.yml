name: Prepare and Upload Artifact

on:
  workflow_call:
    inputs:
      newSha:
        required: false
        type: string
    secrets:
      projectId:
        required: true
      umbracoCloudApiKey:
        required: true
      deployApiKey:
        required: true
      identityClientSecret:
        required: true
    outputs:
      artifactId:
        description: 'The Id of the uploaded artifact'
        value: ${{ jobs.prepareDeployment.outputs.artifactId }}

jobs:
  prepareDeployment:
    name: Prepare Artifact to cloud
    runs-on: ubuntu-latest
    outputs:
      artifactId: ${{ steps.upload-artifact.outputs.artifactId }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.newSha }}

      # Inject secrets into umbraco-cloud.json before packaging.
      # The repo stores __PLACEHOLDERS__; real values come from GitHub Actions secrets
      # so the source tree stays free of secrets while the shipped artifact is complete.
      - name: Inject secrets into umbraco-cloud.json
        env:
          DEPLOY_API_KEY: ${{ secrets.deployApiKey }}
          IDENTITY_CLIENT_SECRET: ${{ secrets.identityClientSecret }}
        run: |
          file="src/UmbracoProject/umbraco-cloud.json"
          python3 - <<'PY'
          import json, os, sys
          path = "src/UmbracoProject/umbraco-cloud.json"
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
          data["Deploy"]["Settings"]["ApiKey"] = os.environ["DEPLOY_API_KEY"]
          data["Identity"]["ClientSecret"] = os.environ["IDENTITY_CLIENT_SECRET"]
          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          PY
          if grep -q "__UMBRACO_DEPLOY_API_KEY__\|__UMBRACO_IDENTITY_CLIENT_SECRET__" "$file"; then
            echo "::error::Secret placeholder still present in $file after injection"
            exit 1
          fi
        shell: bash

      # switch the gitignore files so cloud does not ignore the build frontend assets
      # zip everything, except what is defined in the 'cloud.zipignore'
      - name: Prepare Cloud Git Ignore and Zip Source Code
        run: |
          echo "switching .gitignore with cloud.gitignore"
          cp cloud.gitignore .gitignore
          echo "Packing artifact for upload"
          zip -r sources.zip . -x@cloud.zipignore
        shell: bash

      # store artifact for easy debug if needed
      - name: Store artifact in pipeline
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: ${{GITHUB.WORKSPACE}}/sources.zip
          retention-days: 1

      # Upload your zipped artifact
      - name: Post Zipped Artifact
        id: upload-artifact
        shell: bash
        run: >
          bash ${{ GITHUB.WORKSPACE }}/.github/scripts/upload_artifact.sh 
          ${{ secrets.projectId }} 
          ${{ secrets.umbracoCloudApiKey }} 
          "${{ GITHUB.WORKSPACE }}/sources.zip" 
          "Artifact for ${{ github.run_number }}" 
          "${{ github.run_number }}" 
          GITHUB